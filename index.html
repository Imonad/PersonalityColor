<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>相處特質分析系統（星座、血型、人格顏色）</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --card-bg: #fff;
            --border-color: #eee;
            --text-color: #444;
            --sub-text-color: #aaa;
            --raw-bg: #f8f9fa;
            --raw-border: #ddd;
            --merge-bg: #fffcf9;
            --merge-border: #f0f0f0;
            --pos-color: #337ab7; 
            --icon-color: #5cb85c; 
            --neg-color: #d9534f; 
            --sup-color: #5cb85c; 
        }

        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px; 
            box-sizing: border-box;
            color: var(--text-color);
        }

        .主容器 { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
            max-width: 600px; 
            box-sizing: border-box;
        }

        .卡片 { 
            flex: 1; 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
            box-sizing: border-box;
        }

        .中央卡片 { 
            order: -1; 
            border: 2px solid #f0f0f0; 
            background: var(--merge-bg); 
        }

        h1 { 
            font-size: 0.75rem; 
            letter-spacing: 0.15em; 
            color: var(--sub-text-color); 
            margin: 0 0 15px 0; 
            text-transform: uppercase; 
        }

        .選單區域 {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .選單區塊 { 
            flex: 1;
            text-align: left; 
        }

        label { 
            font-size: 0.6rem; 
            color: #ccc; 
            display: block; 
            margin-bottom: 2px; 
        }

        select { 
            width: 100%; 
            padding: 8px 0; 
            border: none; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 0.85rem; 
            cursor: pointer; 
            outline: none; 
            background: transparent; 
            -webkit-appearance: none; 
        }

        .圓圈 { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            margin: 10px auto; 
            border: 3px solid #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            transition: all 0.3s; 
        }
        
        .中央卡片 .圓圈 {
            width: 90px;
            height: 90px;
        }

        .分析區 { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            margin-top: 10px; 
        }

        .區塊 { 
            text-align: left; 
            padding: 10px; 
            border-radius: 5px; 
            font-size: 0.7rem; 
            line-height: 1.5; 
        }

        .原生 { 
            background: var(--raw-bg); 
            border-left: 3px solid var(--raw-border); 
            color: #777; 
        }

        .干預 { 
            background: var(--card-bg); 
            border-left: 3px solid var(--border-color); 
            color: #444; 
            min-height: 70px; 
        }
        
        .合併屬性區塊 {
            background: white; 
            border: 1px inset var(--merge-border);
        }

        .小標 { 
            font-size: 0.6rem; 
            font-weight: bold; 
            margin-bottom: 4px; 
            color: #999; 
            display: block; 
        }

        .特質項目 { 
            margin-bottom: 2px; 
            display: block; 
        }

        .綠圈 { 
            color: var(--icon-color); 
            font-size: 0.75rem; 
            margin-left: 3px; 
            vertical-align: middle; 
        }
        
        .強化 { color: var(--neg-color); font-weight: bold; } 
        .抑制 { color: var(--sup-color); font-weight: bold; } 
        .正向文字 { color: var(--pos-color); } 

        @media (min-width: 992px) {
            .主容器 { 
                flex-direction: row; 
                max-width: 1350px; 
                padding: 15px;
                align-items: center;
                gap: 15px;
            }
            .卡片 { padding: 25px; }
            .中央卡片 { order: 0; flex: 0 0 370px; } 
            h1 { font-size: 0.8rem; }
            .選單區域 { display: block; margin-bottom: 12px; }
            .選單區塊 { margin-bottom: 12px; }
            select { font-size: 0.9rem; }
            .圓圈 { width: 70px; height: 70px; margin: 15px auto; }
            .中央卡片 .圓圈 { width: 110px; height: 110px; }
            .區塊 { font-size: 0.75rem; padding: 12px; }
            .干預 { min-height: 80px; }
            .綠圈 { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="主容器">
    <div class="卡片 中央卡片">
        <h1>合併人格共鳴</h1>
        <div id="cr" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 合併屬性區塊">
                <span class="小標">● 融合後的特質屬性 (🟢 為正向)</span>
                <div id="descR"></div>
            </div>
        </div>
    </div>

    <div class="卡片">
        <h1>對象 A</h1>
        <div class="選單區域">
            <div class="選單區塊"><label>星座</label><select id="z1" onchange="執行計算()"></select></div>
            <div class="選單區塊"><label>血型</label><select id="b1" onchange="執行計算()"></select></div>
        </div>
        <div id="c1" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 原生"><span class="小標">● 原生本質</span><div id="p1_raw"></div></div>
            <div class="區塊 干預"><span class="小標">● 對方影響</span><div id="p1_inter"></div></div>
        </div>
    </div>

    <div class="卡片">
        <h1>對象 B</h1>
        <div class="選單區域">
            <div class="選單區塊"><label>星座</label><select id="z2" onchange="執行計算()"></select></div>
            <div class="選單區塊"><label>血型</label><select id="b2" onchange="執行計算()"></select></div>
        </div>
        <div id="c2" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 原生"><span class="小標">● 原生本質</span><div id="p2_raw"></div></div>
            <div class="區塊 干預"><span class="小標">● 對方影響</span><div id="p2_inter"></div></div>
        </div>
    </div>
</div>

<script>
    const 星座資料 = {
        "牡羊座": [128, 0, 0, 0],   "金牛座": [0, 128, 0, 128], "雙子座": [0, 64, 64, 128],
        "巨蟹座": [0, 0, 128, 128], "獅子座": [128, 0, 0, 128], "處女座": [64, 64, 0, 128],
        "天秤座": [64, 0, 64, 128], "天蠍座": [0, 0, 128, 0],   "射手座": [64, 64, 0, 0],
        "摩羯座": [0, 128, 0, 0],   "水瓶座": [64, 0, 64, 0],   "雙魚座": [0, 64, 64, 0]
    };
    const 血型資料 = { 
        "O 型": [128, 0, 0, 0], 
        "B 型": [0, 128, 0, 0], 
        "A 型": [0, 0, 128, 0],
        "AB 型": [0, 64, 64, 0] 
    };

    const 基礎定義 = [
        {p: "行動與能量", n: "侵略與暴躁"}, // R
        {p: "和平與穩定", n: "執拗與嫉妒"}, // G
        {p: "嚴謹與深思", n: "憂鬱與墨守"}  // B
    ];
    
    const 二次色定義 = {
        "RG": {p: "樂觀與創意", n: "焦慮與狡詐"}, // 黃 Y
        "GB": {p: "理性與溝通", n: "疏離與冷漠"}, // 青 C
        "BR": {p: "感性與直覺", n: "病態與自我"}  // 紫 M
    };

    window.onload = () => {
        ["z1", "z2", "b1", "b2"].forEach(id => {
            const el = document.getElementById(id);
            el.options.add(new Option(id.startsWith('z') ? "選擇星座" : "選擇血型", "none"));
            const d = id.startsWith('z') ? 星座資料 : 血型資料;
            for (let k in d) el.options.add(new Option(k, k));
        });
    };

    function 生成特質Html(val, posN, negN, 模式) {
        let prefix = "";
        let isPos = val >= 128;
        if (val === 255) prefix = "強大的";
        else if (val > 191) prefix = "明顯的";
        else if (val < 64) prefix = "惡化的";

        let text = prefix + (isPos ? posN : negN);
        let cls = "";
        let iconHtml = "";

        if (!isPos) {
            if (模式 === "強化") { text = "顯著強化的" + text; cls = "強化"; }
            else if (模式 === "削弱") { text = "被抑制的" + text; cls = "抑制"; }
            else if (val < 64) cls = "強化"; 
        } else {
            iconHtml = '<span class="綠圈">🟢</span>'; 
            if (val > 191) cls = "正向文字";
        }
        return `<div class="特質項目 ${cls}">• ${text} (${Math.round(val)})${iconHtml}</div>`;
    }

    function 判定(p陣列, 模式 = "正常") {
        let res = [];
        const [r, g, b] = p陣列;

        // 1. 基礎色
        res.push(生成特質Html(r, 基礎定義[0].p, 基礎定義[0].n, 模式));
        res.push(生成特質Html(g, 基礎定義[1].p, 基礎定義[1].n, 模式));
        res.push(生成特質Html(b, 基礎定義[2].p, 基礎定義[2].n, 模式));

        // 2. 更新後的二次色判定規則 (絕對值 < 64)
        // 黃色 Y (R, G)
        if (Math.abs(r - g) < 64) {
            let avgVal = (r + g) / 2;
            res.push(生成特質Html(avgVal, 二次色定義.RG.p, 二次色定義.RG.n, 模式));
        }
        // 青色 C (G, B)
        if (Math.abs(g - b) < 64) {
            let avgVal = (g + b) / 2;
            res.push(生成特質Html(avgVal, 二次色定義.GB.p, 二次色定義.GB.n, 模式));
        }
        // 紫色 M (B, R)
        if (Math.abs(b - r) < 64) {
            let avgVal = (b + r) / 2;
            res.push(生成特質Html(avgVal, 二次色定義.BR.p, 二次色定義.BR.n, 模式));
        }

        return res.join('');
    }

    function 執行計算() {
        const getP = (z, b) => {
            const zv = document.getElementById(z).value, bv = document.getElementById(b).value;
            if (zv === "none" || bv === "none") return null;
            return [星座資料[zv][0]+血型資料[bv][0], 星座資料[zv][1]+血型資料[bv][1], 星座資料[zv][2]+血型資料[bv][2], 星座資料[zv][3]+血型資料[bv][3]];
        };

        const p1 = getP("z1", "b1"), p2 = getP("z2", "b2");
        if (!p1 || !p2) return;

        document.getElementById("p1_raw").innerHTML = 判定(p1);
        document.getElementById("p2_raw").innerHTML = 判定(p2);
        document.getElementById("c1").style.backgroundColor = `rgba(${p1[0]},${p1[1]},${p1[2]},${(p1[3]||255)/255})`;
        document.getElementById("c2").style.backgroundColor = `rgba(${p2[0]},${p2[1]},${p2[2]},${(p2[3]||255)/255})`;

        let m1 = "正常", m2 = "正常";
        let l1 = p1[3], l2 = p2[3];
        if (l1 === 128 && l2 === 128) m1 = m2 = "削弱";
        else if (l1 === 0 && l2 === 0) m1 = m2 = "強化";

        const calculateInterP = (targetP, targetL, otherL) => {
            return targetP.slice(0, 3).map(v => {
                let newVal = v;
                let isPos = v >= 128;
                if (targetL === 128 && otherL === 128) { if (isPos) newVal = Math.min(255, v + 64); }
                else if (targetL === 0 && otherL === 0) { if (isPos) newVal = Math.max(0, v - 64); }
                else if (targetL !== otherL) {
                    if (isPos) newVal = Math.min(255, v + 32);
                    else newVal = Math.max(0, v - 32);
                }
                return newVal;
            });
        };

        const interP1_values = calculateInterP(p1, l1, l2);
        const interP2_values = calculateInterP(p2, l2, l1);

        document.getElementById("p1_inter").innerHTML = (m1 === "正常" && l1 === l2) ? "無顯著場域干預" : 判定(interP1_values, m1);
        document.getElementById("p2_inter").innerHTML = (m2 === "正常" && l1 === l2) ? "無顯著場域干預" : 判定(interP2_values, m2);

        let finalRGB = [Math.min(255, p1[0]+p2[0]), Math.min(255, p1[1]+p2[1]), Math.min(255, p1[2]+p2[2])];
        finalRGB.forEach((v, i) => {
            let isPos = v >= 128;
            if (l1 === 128 && l2 === 128) { if (isPos) finalRGB[i] = Math.min(255, v + 64); }
            else if (l1 === 0 && l2 === 0) { if (isPos) finalRGB[i] = Math.max(0, v - 64); }
            else if (l1 !== l2) {
                if (isPos) finalRGB[i] = Math.min(255, v + 32);
                else finalRGB[i] = Math.max(0, v - 32);
            }
        });

        document.getElementById("descR").innerHTML = 判定(finalRGB);
        document.getElementById("cr").style.backgroundColor = `rgba(${finalRGB[0]},${finalRGB[1]},${finalRGB[2]},${(Math.min(255, l1+l2)||255)/255})`;
    }
</script>
</body>
</html>
