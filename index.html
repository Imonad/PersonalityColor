<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>相處特質分析系統</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --card-bg: #fff;
            --border-color: #eee;
            --text-color: #444;
            --sub-text-color: #aaa;
            --raw-bg: #f8f9fa;
            --raw-border: #ddd;
            --merge-bg: #fffcf9;
            --merge-border: #f0f0f0;
            --color-pos: #7f7fff;
            --color-neg: #ff7f7f;
            --color-extreme-min: #FF0000;
            --color-extreme-max: #0000FF;
            --color-up: #009F00;
            --color-down: #FF0000;
        }

        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 10px; 
            box-sizing: border-box;
            color: var(--text-color);
        }

        .頁首區域 { text-align: center; margin-bottom: 25px; }
        .主標題 { font-size: 1.5rem; font-weight: bold; color: #333; margin: 0; letter-spacing: 2px; }
        .版本資訊 { font-size: 0.7rem; color: var(--sub-text-color); margin-top: 5px; }

        .主容器 { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 600px; box-sizing: border-box; }
        .卡片 { flex: 1; background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); box-sizing: border-box; }
        .中央卡片 { order: -1; border: 2px solid #f0f0f0; background: var(--merge-bg); }
        h1 { font-size: 0.75rem; letter-spacing: 0.15em; color: var(--sub-text-color); margin: 0 0 15px 0; text-transform: uppercase; }

        .選單區域 { display: flex; gap: 10px; margin-bottom: 12px; }
        .選單區塊 { flex: 1; text-align: left; }
        label { font-size: 0.6rem; color: #ccc; display: block; margin-bottom: 2px; }
        select { width: 100%; padding: 8px 0; border: none; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; cursor: pointer; outline: none; background: transparent; -webkit-appearance: none; }

        .圓圈 { width: 60px; height: 60px; border-radius: 50%; margin: 10px auto; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: all 0.3s; background-color: #eee; }
        .中央卡片 .圓圈 { width: 90px; height: 90px; }

        .分析區 { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .區塊 { text-align: left; padding: 10px; border-radius: 5px; font-size: 0.7rem; line-height: 1.5; min-height: 20px; }
        .原生 { background: var(--raw-bg); border-left: 3px solid var(--raw-border); color: #777; }
        .干預 { background: var(--card-bg); border-left: 3px solid var(--border-color); color: #444; min-height: 70px; }
        .合併屬性區塊 { background: white; border: 1px inset var(--merge-border); }

        .小標 { font-size: 0.6rem; font-weight: bold; margin-bottom: 4px; color: #999; display: block; }
        .特質項目 { margin-bottom: 2px; display: block; }
        .趨勢標記 { font-size: 0.6rem; margin-left: 4px; vertical-align: middle; }

        @media (min-width: 992px) {
            .主容器 { flex-direction: row; max-width: 1350px; padding: 15px; align-items: center; gap: 15px; }
            .中央卡片 { order: 0; flex: 0 0 370px; } 
            .圓圈 { width: 70px; height: 70px; }
            .中央卡片 .圓圈 { width: 110px; height: 110px; }
            .區塊 { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<div class="頁首區域">
    <div class="主標題">相處特質分析系統</div>
    <div id="version-info" class="版本資訊"></div>
</div>

<div class="主容器">
    <div class="卡片 中央卡片">
        <h1>合併人格共鳴</h1>
        <div id="cr" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 合併屬性區塊">
                <span class="小標">● 融合後的特質屬性</span>
                <div id="descR"></div>
            </div>
        </div>
    </div>

    <div class="卡片">
        <h1>對象 A</h1>
        <div class="選單區域">
            <div class="選單區塊"><label>星座</label><select id="z1" onchange="執行計算()"></select></div>
            <div class="選單區塊"><label>血型</label><select id="b1" onchange="執行計算()"></select></div>
        </div>
        <div id="c1" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 原生"><span class="小標">● 原生本質</span><div id="p1_raw"></div></div>
            <div class="區塊 干預"><span class="小標">● 對方影響</span><div id="p1_inter"></div></div>
        </div>
    </div>

    <div class="卡片">
        <h1>對象 B</h1>
        <div class="選單區域">
            <div class="選單區塊"><label>星座</label><select id="z2" onchange="執行計算()"></select></div>
            <div class="選單區塊"><label>血型</label><select id="b2" onchange="執行計算()"></select></div>
        </div>
        <div id="c2" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 原生"><span class="小標">● 原生本質</span><div id="p2_raw"></div></div>
            <div class="區塊 干預"><span class="小標">● 對方影響</span><div id="p2_inter"></div></div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        VERSION: "1.5.3",
        UI: { NO_INTERFERENCE: "無顯著場域干預" },
        THRESHOLDS: { OFFSET: 128, POSITIVE: 128, SECONDARY_DIFF: 32 },
        COLORS: {
            POS: "#7f7fff", NEG: "#ff7f7f", MIN: "#FF0000", MAX: "#0000FF",
            UP: "#009F00", DOWN: "#FF0000"
        },
        PREFIX: {
            STRONG: "極致的", OBVIOUS: "明顯的", DETERIORATED: "糟糕的",
            INTER_ENHANCED: "被強化的", INTER_SUPPRESSED: "被抑制的",
            INTER_WEAKENED: "被削弱的", INTER_INTENSIFIED: "顯著加劇的"
        },
        TRAITS: {
            PRIMARY: [
                { p: "行動與能量", n: "侵略與暴躁" },
                { p: "和平與穩定", n: "執拗與嫉妒" },
                { p: "嚴謹與深思", n: "憂鬱與墨守" }
            ],
            SECONDARY: {
                RG: { p: "樂觀與創意", n: "焦慮與狡詐" },
                GB: { p: "理性與溝通", n: "疏離與冷漠" },
                BR: { p: "感性與直覺", n: "病態與自我" }
            }
        },
        DATA: {
            ZODIAC: {
                "牡羊座": [128, 0, 0, 0],   "金牛座": [0, 128, 0, 128], "雙子座": [0, 64, 64, 128],
                "巨蟹座": [0, 0, 128, 128], "獅子座": [128, 0, 0, 128], "處女座": [64, 64, 0, 128],
                "天秤座": [64, 0, 64, 128], "天蠍座": [0, 0, 128, 0],   "射手座": [64, 64, 0, 0],
                "摩羯座": [0, 128, 0, 0],   "水瓶座": [64, 0, 64, 0],   "雙魚座": [0, 64, 64, 0]
            },
            BLOOD: { 
                "O 型": [128, 0, 0, 0], "B 型": [0, 128, 0, 0], "A 型": [0, 0, 128, 0], "AB 型": [0, 64, 64, 0] 
            }
        }
    };

    window.onload = () => {
        const today = new Date();
        document.getElementById("version-info").innerText = `Version: ${CONFIG.VERSION} | Generated: ${today.toLocaleDateString()}`;
        const setupSelect = (id, data, text) => {
            const el = document.getElementById(id);
            el.options.add(new Option(text, "none"));
            for (let k in data) el.options.add(new Option(k, k));
        };
        setupSelect("z1", CONFIG.DATA.ZODIAC, "選擇星座");
        setupSelect("z2", CONFIG.DATA.ZODIAC, "選擇星座");
        setupSelect("b1", CONFIG.DATA.BLOOD, "選擇血型");
        setupSelect("b2", CONFIG.DATA.BLOOD, "選擇血型");
    };

    function 生成特質Html(val, posN, negN, 原生值) {
        let isPos = val >= CONFIG.THRESHOLDS.POSITIVE;
        let displayVal = Math.round(val - CONFIG.THRESHOLDS.OFFSET);
        let text = (isPos ? posN : negN);
        let style = "";
        let arrowHtml = "";

        if (原生值 !== undefined && Math.round(val) !== Math.round(原生值)) {
            if (val > 原生值) {
                style = `color: ${CONFIG.COLORS.UP};`;
                text = (isPos ? CONFIG.PREFIX.INTER_ENHANCED : CONFIG.PREFIX.INTER_SUPPRESSED) + text;
                arrowHtml = `<span class="趨勢標記" style="color:${CONFIG.COLORS.UP}">▲</span>`;
            } else {
                style = `color: ${CONFIG.COLORS.DOWN};`;
                text = (isPos ? CONFIG.PREFIX.INTER_WEAKENED : CONFIG.PREFIX.INTER_INTENSIFIED) + text;
                arrowHtml = `<span class="趨勢標記" style="color:${CONFIG.COLORS.DOWN}">▼</span>`;
            }
        } else {
            if (val >= 255) { text = CONFIG.PREFIX.STRONG + text; style = `color:${CONFIG.COLORS.MAX}; font-weight:bold;`; }
            else if (val > 191) text = CONFIG.PREFIX.OBVIOUS + text;
            else if (val < 64) { 
                if (val === 0) { text = CONFIG.PREFIX.DETERIORATED + text; style = `color:${CONFIG.COLORS.MIN}; font-weight:bold;`; }
            }
            if (!style) style = `color: ${isPos ? CONFIG.COLORS.POS : CONFIG.COLORS.NEG};`;
        }
        return `<div class="特質項目" style="${style}">• ${text} (${displayVal})${arrowHtml}</div>`;
    }

    function 判定(p陣列, 原生陣列) {
        let res = [];
        const [r, g, b] = p陣列;
        const [or, og, ob] = 原生陣列 || [undefined, undefined, undefined];

        CONFIG.TRAITS.PRIMARY.forEach((trait, i) => {
            res.push(生成特質Html(p陣列[i], trait.p, trait.n, 原生陣列 ? 原生陣列[i] : undefined));
        });

        const checkSec = (v1, v2, def, ov1, ov2) => {
            if (Math.abs(v1 - v2) <= CONFIG.THRESHOLDS.SECONDARY_DIFF) {
                let curAvg = (v1 + v2) / 2;
                let oldAvg = (ov1 !== undefined && ov2 !== undefined) ? (ov1 + ov2) / 2 : undefined;
                res.push(生成特質Html(curAvg, def.p, def.n, oldAvg));
            }
        };
        checkSec(r, g, CONFIG.TRAITS.SECONDARY.RG, or, og);
        checkSec(g, b, CONFIG.TRAITS.SECONDARY.GB, og, ob);
        checkSec(b, r, CONFIG.TRAITS.SECONDARY.BR, ob, or);

        return res.join('');
    }

    function 執行計算() {
        const getP = (z, b) => {
            const zv = document.getElementById(z).value, bv = document.getElementById(b).value;
            if (zv === "none" || bv === "none") return null;
            const zD = CONFIG.DATA.ZODIAC[zv], bD = CONFIG.DATA.BLOOD[bv];
            return [zD[0]+bD[0], zD[1]+bD[1], zD[2]+bD[2], zD[3]+bD[3]];
        };

        const p1 = getP("z1", "b1"), p2 = getP("z2", "b2");

        // 顯示 A 原生與圓圈顏色 (套用亮度加成)
        if (p1) {
            document.getElementById("p1_raw").innerHTML = 判定(p1);
            let lum = p1[3] || 0;
            let r = Math.min(255, p1[0] + lum), g = Math.min(255, p1[1] + lum), b = Math.min(255, p1[2] + lum);
            document.getElementById("c1").style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        } else {
            document.getElementById("p1_raw").innerHTML = "";
            document.getElementById("c1").style.backgroundColor = "#eee";
        }

        // 顯示 B 原生與圓圈顏色 (套用亮度加成)
        if (p2) {
            document.getElementById("p2_raw").innerHTML = 判定(p2);
            let lum = p2[3] || 0;
            let r = Math.min(255, p2[0] + lum), g = Math.min(255, p2[1] + lum), b = Math.min(255, p2[2] + lum);
            document.getElementById("c2").style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        } else {
            document.getElementById("p2_raw").innerHTML = "";
            document.getElementById("c2").style.backgroundColor = "#eee";
        }
        
        if (!p1 || !p2) {
            document.getElementById("p1_inter").innerHTML = "";
            document.getElementById("p2_inter").innerHTML = "";
            document.getElementById("descR").innerHTML = "";
            document.getElementById("cr").style.backgroundColor = "#eee";
            return;
        }

        // 對方影響計算
        const calcInter = (tP, tL, oL) => tP.slice(0,3).map(v => {
            let isPos = v >= 128;
            if (tL === 128 && oL === 128) return isPos ? Math.min(255, v+64) : v;
            if (tL === 0 && oL === 0) return isPos ? Math.max(0, v-64) : v;
            return tL !== oL ? (isPos ? Math.min(255, v+32) : Math.max(0, v-32)) : v;
        });

        const iP1 = calcInter(p1, p1[3], p2[3]), iP2 = calcInter(p2, p2[3], p1[3]);
        document.getElementById("p1_inter").innerHTML = (p1[3]===p2[3] && p1[3]!==128 && p1[3]!==0) ? CONFIG.UI.NO_INTERFERENCE : 判定(iP1, p1);
        document.getElementById("p2_inter").innerHTML = (p1[3]===p2[3] && p1[3]!==128 && p1[3]!==0) ? CONFIG.UI.NO_INTERFERENCE : 判定(iP2, p2);

        // 合併人格計算與圓圈顏色
        let fRGB = p1.slice(0,3).map((v, i) => {
            let sum = v + p2[i];
            if (p1[3] === 128 && p2[3] === 128) sum = Math.min(255, sum + 64);
            else if (p1[3] === 0 && p2[3] === 0) sum = Math.max(0, sum - 64);
            return Math.max(0, Math.min(255, sum));
        });

        document.getElementById("descR").innerHTML = 判定(fRGB);
        document.getElementById("cr").style.backgroundColor = `rgb(${fRGB[0]}, ${fRGB[1]}, ${fRGB[2]})`;
    }
</script>
</body>
</html>
