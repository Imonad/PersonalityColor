<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本質個性分析系統 - 行動適配版</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --card-bg: #fff;
            --border-color: #eee;
            --text-color: #444;
            --sub-text-color: #aaa;
            --raw-bg: #f8f9fa;
            --raw-border: #ddd;
            --merge-bg: #fffcf9;
            --merge-border: #f0f0f0;
            --pos-color: #337ab7; /* 正向特質文字：藍 */
            --icon-color: #5cb85c; /* 綠圈🟢樣式 */
            --neg-color: #d9534f; /* 負面惡化文字：紅 */
            --sup-color: #5cb85c; /* 負面改善文字：綠 */
        }

        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px; /* 小螢幕邊距 */
            box-sizing: border-box;
            color: var(--text-color);
        }

        /* 主容器佈局修改 */
        .主容器 { 
            display: flex; 
            flex-direction: column; /* 預設改為垂直堆疊 */
            gap: 15px; 
            width: 100%; 
            max-width: 600px; /* 手機端限制最大寬度 */
            box-sizing: border-box;
        }

        /* 卡片樣式修改 */
        .卡片 { 
            flex: 1; 
            background: var(--card-bg); 
            padding: 20px; /* 減少縮進 */
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
            box-sizing: border-box;
        }

        /* 中央卡片特別佈局 */
        .中央卡片 { 
            order: -1; /* 將合併人格移至最上方 */
            border: 2px solid #f0f0f0; 
            background: var(--merge-bg); 
        }

        h1 { 
            font-size: 0.75rem; 
            letter-spacing: 0.15em; 
            color: var(--sub-text-color); 
            margin: 0 0 15px 0; 
            text-transform: uppercase; 
        }

        /* 選單佈局調整 */
        .選單區域 {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .選單區塊 { 
            flex: 1;
            text-align: left; 
        }

        label { 
            font-size: 0.6rem; 
            color: #ccc; 
            display: block; 
            margin-bottom: 2px; 
        }

        select { 
            width: 100%; 
            padding: 8px 0; /* 增加點擊區域 */
            border: none; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 0.85rem; 
            cursor: pointer; 
            outline: none; 
            background: transparent; 
            -webkit-appearance: none; /* 移除預設樣式 */
        }

        .圓圈 { 
            width: 60px; /* 縮小尺寸 */
            height: 60px; 
            border-radius: 50%; 
            margin: 10px auto; 
            border: 3px solid #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            transition: all 0.3s; 
        }
        
        /* 中央圓圈縮小 */
        .中央卡片 .圓圈 {
            width: 90px;
            height: 90px;
        }

        .分析區 { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            margin-top: 10px; 
        }

        .區塊 { 
            text-align: left; 
            padding: 10px; 
            border-radius: 5px; 
            font-size: 0.7rem; /* 手機字體調整 */
            line-height: 1.5; 
        }

        .原生 { 
            background: var(--raw-bg); 
            border-left: 3px solid var(--raw-border); 
            color: #777; 
        }

        .干預 { 
            background: var(--card-bg); 
            border-left: 3px solid var(--border-color); 
            color: #444; 
            min-height: 70px; /* 降低高度 */
        }
        
        .合併屬性區塊 {
            background: white; 
            border: 1px inset var(--merge-border);
        }

        .小標 { 
            font-size: 0.6rem; 
            font-weight: bold; 
            margin-bottom: 4px; 
            color: #999; 
            display: block; 
        }

        .特質項目 { 
            margin-bottom: 2px; 
            display: block; 
        }

        .綠圈 { 
            color: var(--icon-color); 
            font-size: 0.75rem; 
            margin-left: 3px; 
            vertical-align: middle; 
        }
        
        /* 樣式類 */
        .強化 { color: var(--neg-color); font-weight: bold; } 
        .抑制 { color: var(--sup-color); font-weight: bold; } 
        .正向文字 { color: var(--pos-color); } 

        /* 媒體查詢：在大螢幕時切換回橫向佈局 */
        @media (min-width: 992px) {
            .主容器 { 
                flex-direction: row; /* 恢復橫向 */
                max-width: 1350px; 
                padding: 15px;
                align-items: center;
                gap: 15px;
            }
            
            .卡片 { padding: 25px; }
            .中央卡片 { order: 0; flex: 0 0 370px; } /* 恢復位置和寬度 */
            
            h1 { font-size: 0.8rem; }
            .選單區域 { display: block; margin-bottom: 12px; }
            .選單區塊 { margin-bottom: 12px; }
            select { font-size: 0.9rem; }
            .圓圈 { width: 70px; height: 70px; margin: 15px auto; }
            .中央卡片 .圓圈 { width: 110px; height: 110px; }
            .區塊 { font-size: 0.75rem; padding: 12px; }
            .干預 { min-height: 80px; }
            .綠圈 { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="主容器">
    <div class="卡片 中央卡片">
        <h1>合併人格共鳴</h1>
        <div id="cr" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 合併屬性區塊">
                <span class="小標">● 融合後的特質屬性 (🟢 為正向)</span>
                <div id="descR"></div>
            </div>
        </div>
    </div>

    <div class="卡片">
        <h1>對象 A</h1>
        <div class="選單區域">
            <div class="選單區塊"><label>星座</label><select id="z1" onchange="執行計算()"></select></div>
            <div class="選單區塊"><label>血型</label><select id="b1" onchange="執行計算()"></select></div>
        </div>
        <div id="c1" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 原生"><span class="小標">● 原生本質</span><div id="p1_raw"></div></div>
            <div class="區塊 干預"><span class="小標">● 對方影響</span><div id="p1_inter"></div></div>
        </div>
    </div>

    <div class="卡片">
        <h1>對象 B</h1>
        <div class="選單區域">
            <div class="選單區塊"><label>星座</label><select id="z2" onchange="執行計算()"></select></div>
            <div class="選單區塊"><label>血型</label><select id="b2" onchange="執行計算()"></select></div>
        </div>
        <div id="c2" class="圓圈"></div>
        <div class="分析區">
            <div class="區塊 原生"><span class="小標">● 原生本質</span><div id="p2_raw"></div></div>
            <div class="區塊 干預"><span class="小標">● 對方影響</span><div id="p2_inter"></div></div>
        </div>
    </div>
</div>

<script>
    // 核心邏輯保持不變
    const 星座資料 = {
        "牡羊座": [128, 0, 0, 0],   "金牛座": [0, 128, 0, 128], "雙子座": [0, 64, 64, 128],
        "巨蟹座": [0, 0, 128, 128], "獅子座": [128, 0, 0, 128], "處女座": [64, 64, 0, 128],
        "天秤座": [64, 0, 64, 128], "天蠍座": [0, 0, 128, 0],   "射手座": [64, 64, 0, 0],
        "摩羯座": [0, 128, 0, 0],   "水瓶座": [64, 0, 64, 0],   "雙魚座": [0, 64, 64, 0]
    };
    const 血型資料 = { 
        "O 型": [127, 0, 0, 0], 
        "B 型": [0, 127, 0, 0], 
        "A 型": [0, 0, 127, 0],
        "AB 型": [0, 64, 64, 0] // 0x00404000
    };
    const 定義 = [{p: "行動與能量", n: "侵略與煩燥"}, {p: "和平與穩定", n: "執拗與嫉妒"}, {p: "嚴謹與深思", n: "憂鬱與墨守"}];

    window.onload = () => {
        ["z1", "z2", "b1", "b2"].forEach(id => {
            const el = document.getElementById(id);
            el.options.add(new Option(id.startsWith('z') ? "選擇星座" : "選擇血型", "none"));
            const d = id.startsWith('z') ? 星座資料 : 血型資料;
            for (let k in d) el.options.add(new Option(k, k));
        });
    };

    function 判定(val, posN, negN, 模式 = "正常") {
        let prefix = "";
        let isPos = val >= 0x80;
        
        if (val === 0xFF) prefix = "強大的";
        else if (val > 0xBF) prefix = "明顯的";
        else if (val >= 0x80) prefix = "";
        else if (val >= 0x40) prefix = "";
        else prefix = "惡化的"; 

        let text = prefix + (isPos ? posN : negN);
        let cls = "";
        let iconHtml = "";

        if (!isPos) {
            if (模式 === "強化") { text = "顯著強化的" + text; cls = "強化"; }
            else if (模式 === "削弱") { text = "被抑制的" + text; cls = "抑制"; }
            else if (val < 0x40) cls = "強化"; 
        } else {
            iconHtml = '<span class="綠圈">🟢</span>'; // 正向特質加綠圈
            if (val > 0xBF) cls = "正向文字";
        }

        return `<div class="特質項目 ${cls}">• ${text}${iconHtml}</div>`;
    }

    function 執行計算() {
        const getP = (z, b) => {
            const zv = document.getElementById(z).value, bv = document.getElementById(b).value;
            if (zv === "none" || bv === "none") return null;
            return [星座資料[zv][0]+血型資料[bv][0], 星座資料[zv][1]+血型資料[bv][1], 星座資料[zv][2]+血型資料[bv][2], 星座資料[zv][3]+血型資料[bv][3]];
        };

        const p1 = getP("z1", "b1"), p2 = getP("z2", "b2");
        if (!p1 || !p2) return;

        document.getElementById("p1_raw").innerHTML = p1.slice(0,3).map((v,i)=>判定(v, 定義[i].p, 定義[i].n)).join('');
        document.getElementById("p2_raw").innerHTML = p2.slice(0,3).map((v,i)=>判定(v, 定義[i].p, 定義[i].n)).join('');
        document.getElementById("c1").style.backgroundColor = `rgba(${p1[0]},${p1[1]},${p1[2]},${(p1[3]||255)/255})`;
        document.getElementById("c2").style.backgroundColor = `rgba(${p2[0]},${p2[1]},${p2[2]},${(p2[3]||255)/255})`;

        let m1 = "正常", m2 = "正常";
        if (p1[3] === 128 && p2[3] === 128) m1 = m2 = "削弱";
        else if (p1[3] === 0 && p2[3] === 0) m1 = m2 = "強化";

        const renderInter = (p, m) => m === "正常" ? "無顯著場域干預" : p.slice(0,3).map((v,i)=>判定(v, 定義[i].p, 定義[i].n, m)).join('');
        document.getElementById("p1_inter").innerHTML = renderInter(p1, m1);
        document.getElementById("p2_inter").innerHTML = renderInter(p2, m2);

        let baseRGB = [Math.min(255, p1[0]+p2[0]), Math.min(255, p1[1]+p2[1]), Math.min(255, p1[2]+p2[2])];
        let finalRGB = [...baseRGB], l1 = p1[3], l2 = p2[3];

        baseRGB.forEach((v, i) => {
            let isPos = v >= 0x80;
            if (l1 === 128 && l2 === 128) { if (isPos) finalRGB[i] = Math.min(255, v + 0x40); }
            else if (l1 === 0 && l2 === 0) { if (isPos) finalRGB[i] = Math.max(0, v - 0x40); }
            else if (l1 !== l2) {
                if (isPos) finalRGB[i] = Math.min(255, v + 0x20); // 不同：強化正向
                else finalRGB[i] = Math.max(0, v - 0x20);        // 不同：加深負向
            }
        });

        document.getElementById("descR").innerHTML = finalRGB.map((v,i)=>判定(v, 定義[i].p, 定義[i].n)).join('');
        
        // 中央圓圈亮度計算 (確保視覺上有透明度變化)
        document.getElementById("cr").style.backgroundColor = `rgba(${finalRGB[0]},${finalRGB[1]},${finalRGB[2]},${(Math.min(255, l1+l2)||255)/255})`;
    }
</script>
</body>
</html>
